<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#818CF8" stop-opacity="1"/>
      <stop offset="70%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="lineGlow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#334155" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="16" fill="url(#bgGrad)"/>
  <rect width="900" height="280" rx="16" fill="url(#accentGrad)"/>
  <rect width="900" height="280" rx="16" fill="url(#grid)" opacity="0.5"/>
  <rect width="900" height="280" rx="16" fill="url(#dots)" opacity="0.6"/>

  <!-- Decorative corner accents -->
  <path d="M0 40 L0 16 Q0 0 16 0 L40 0" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <path d="M900 40 L900 16 Q900 0 884 0 L860 0" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <path d="M0 240 L0 264 Q0 280 16 280 L40 280" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>
  <path d="M900 240 L900 264 Q900 280 884 280 L860 280" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>

  <!-- Top glow line -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="url(#glowLine)" stroke-width="1.5"/>
  <line x1="0" y1="1" x2="900" y2="1" stroke="url(#glowLine)" stroke-width="4" filter="url(#lineGlow)" opacity="0.5"/>

  <!-- Central icon group -->
  <g transform="translate(310, 55)" filter="url(#iconGlow)">
    <!-- Outer rounded rectangle (task card) -->
    <rect x="0" y="0" width="72" height="72" rx="16" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>

    <!-- Inner task lines -->
    <line x1="20" y1="22" x2="55" y2="22" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="36" x2="48" y2="36" stroke="#818CF8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="50" x2="42" y2="50" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

    <!-- Checkmark circle overlay -->
    <g transform="translate(48, 48)">
      <circle cx="12" cy="12" r="14" fill="#0D1117" stroke="url(#checkGrad)" stroke-width="2"/>
      <polyline points="5,12 10,17 19,7" fill="none" stroke="url(#checkGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Small vision/eye icon -->
    <g transform="translate(-8, -8)" opacity="0.7">
      <ellipse cx="12" cy="12" rx="10" ry="6" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="3" fill="#60A5FA"/>
    </g>
  </g>

  <!-- Title text -->
  <text x="400" y="170" text-anchor="start" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1" fill="url(#textGrad)">TaskVision</text>

  <!-- Version badge -->
  <g transform="translate(660, 148)">
    <rect width="52" height="22" rx="11" fill="#1E293B" stroke="#3B82F6" stroke-width="0.8" opacity="0.8"/>
    <text x="26" y="15" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="10" fill="#60A5FA" font-weight="500">v2.0</text>
  </g>

  <!-- Subtitle -->
  <text x="450" y="205" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8" letter-spacing="0.5">
    Code Comments → Task Board → AI Context
  </text>

  <!-- Decorative status badges row -->
  <g transform="translate(226, 230)">
    <!-- todo -->
    <rect x="0" y="0" width="56" height="24" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="0.8" opacity="0.6"/>
    <circle cx="14" cy="12" r="3.5" fill="#3B82F6"/>
    <text x="22" y="16" font-family="'SF Mono', monospace" font-size="10" fill="#60A5FA">todo</text>

    <!-- doing -->
    <rect x="68" y="0" width="60" height="24" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="0.8" opacity="0.6"/>
    <circle cx="82" cy="12" r="3.5" fill="#F59E0B"/>
    <text x="90" y="16" font-family="'SF Mono', monospace" font-size="10" fill="#FBBF24">doing</text>

    <!-- blocked -->
    <rect x="140" y="0" width="72" height="24" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="0.8" opacity="0.6"/>
    <circle cx="154" cy="12" r="3.5" fill="#EF4444"/>
    <text x="162" y="16" font-family="'SF Mono', monospace" font-size="10" fill="#F87171">blocked</text>

    <!-- review -->
    <rect x="224" y="0" width="66" height="24" rx="12" fill="#1E293B" stroke="#A78BFA" stroke-width="0.8" opacity="0.6"/>
    <circle cx="238" cy="12" r="3.5" fill="#A78BFA"/>
    <text x="246" y="16" font-family="'SF Mono', monospace" font-size="10" fill="#C4B5FD">review</text>

    <!-- done -->
    <rect x="302" y="0" width="56" height="24" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="0.8" opacity="0.6"/>
    <circle cx="316" cy="12" r="3.5" fill="#22C55E"/>
    <text x="324" y="16" font-family="'SF Mono', monospace" font-size="10" fill="#4ADE80">done</text>

    <!-- idea -->
    <rect x="370" y="0" width="56" height="24" rx="12" fill="#1E293B" stroke="#06B6D4" stroke-width="0.8" opacity="0.6"/>
    <circle cx="384" cy="12" r="3.5" fill="#06B6D4"/>
    <text x="392" y="16" font-family="'SF Mono', monospace" font-size="10" fill="#22D3EE">idea</text>
  </g>

  <!-- Bottom glow line -->
  <line x1="0" y1="279" x2="900" y2="279" stroke="url(#glowLine)" stroke-width="1.5"/>
  <line x1="0" y1="279" x2="900" y2="279" stroke="url(#glowLine)" stroke-width="4" filter="url(#lineGlow)" opacity="0.5"/>
</svg>